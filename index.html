<!DOCTYPE html><html><head><meta charset='utf-8'>
<style>
body{font-family:Arial;background:#faf7ff;text-align:center}
canvas{border:4px solid #444;border-radius:50%}
button{font-size:22px;padding:10px 22px;margin:15px}
#wrap{display:flex;justify-content:center;gap:40px;align-items:flex-start;flex-wrap:wrap}
#result{font-size:28px;font-weight:bold;color:#6a1b9a}
ul{text-align:left;max-width:260px}
</style></head><body>
<h1>🎡 Daddy & Madelyn Adventure Wheel</h1>
<div id='wrap'>
<div><canvas id='c' width='700' height='700'></canvas><br><button onclick='spin()'>SPIN ❤️</button><div id='result'></div></div>
<div><h3>Wheel Items</h3><ul id='list'></ul></div></div>
<script>
const items=["Nature Walk","New Playground","Library","EarlyON","Picnic","Farmers Market","Ice Cream","Watch Boats","Pet Store","Dance Party","Finger Paint","Bubbles"];
const colors=["#ffb3ba","#ffdfba","#ffffba","#baffc9","#bae1ff","#d5baff"];
const c=document.getElementById('c'),ctx=c.getContext('2d');
document.getElementById('list').innerHTML=items.map(x=>"<li>"+x+"</li>").join("");
let angle=0;
function draw(a){
ctx.clearRect(0,0,700,700);
let cx=350,cy=350,r=320;
let step=2*Math.PI/items.length;
for(let i=0;i<items.length;i++){
ctx.beginPath();ctx.moveTo(cx,cy);
ctx.fillStyle=colors[i%colors.length];
ctx.arc(cx,cy,r,a+i*step,a+(i+1)*step);ctx.fill();
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(a+i*step+step/2);
ctx.textAlign="right";
ctx.font="bold 18px Arial";
ctx.fillStyle="#000";
ctx.fillText(items[i],r-20,6);
ctx.restore();
}
ctx.beginPath();ctx.arc(cx,cy,40,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();
ctx.fillStyle="red";
ctx.beginPath();ctx.moveTo(350,10);ctx.lineTo(335,45);ctx.lineTo(365,45);ctx.fill();
}
draw(angle);
function spin(){
let idx=Math.floor(Math.random()*items.length);
let target=6*Math.PI*2 + (Math.PI*1.5 - (idx+0.5)*(2*Math.PI/items.length));
let start=angle,dur=5000,t0=performance.now();
function anim(t){
let p=Math.min((t-t0)/dur,1);
let e=1-Math.pow(1-p,3);
angle=start+(target-start)*e;
draw(angle);
if(p<1)requestAnimationFrame(anim);
else document.getElementById('result').innerText="Today's Adventure: "+items[idx];
}
requestAnimationFrame(anim);
}
</script></body></html>
